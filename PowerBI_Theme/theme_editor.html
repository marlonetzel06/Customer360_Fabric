<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power BI Theme Editor — Customer360</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; background: #f4f6f9; color: #222; }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 220px;
    min-width: 220px;
    background: #0f4c81;
    color: #fff;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #sidebar h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    padding: 18px 14px 10px;
    color: #a8c8e8;
  }
  #sidebar-search {
    margin: 0 10px 10px;
    padding: 6px 10px;
    border-radius: 6px;
    border: none;
    font-size: 12px;
    background: #1a5f99;
    color: #fff;
    outline: none;
    width: calc(100% - 20px);
  }
  #sidebar-search::placeholder { color: #7aadcc; }
  #visual-list {
    list-style: none;
    overflow-y: scroll;
    flex: 1;
    padding-bottom: 12px;
    scrollbar-width: thin;
    scrollbar-color: #1a5f99 transparent;
  }
  #visual-list::-webkit-scrollbar { width: 4px; }
  #visual-list::-webkit-scrollbar-track { background: transparent; }
  #visual-list::-webkit-scrollbar-thumb { background: #1a5f99; border-radius: 2px; }
  #visual-list li {
    padding: 9px 16px;
    cursor: pointer;
    font-size: 13px;
    border-left: 3px solid transparent;
    transition: background .15s, border-color .15s;
  }
  #visual-list li:hover { background: #1a5f99; }
  #visual-list li.active { background: #1f8ac0; border-left-color: #3bbfce; font-weight: 600; }
  #visual-list li .badge {
    font-size: 10px;
    background: #1a5f99;
    color: #a8c8e8;
    border-radius: 10px;
    padding: 1px 6px;
    margin-left: 6px;
    vertical-align: middle;
  }
  #visual-list li.active .badge { background: #0f4c81; }

  /* ── MAIN CONTENT (settings + JSON) ── */
  #main { flex: 1; display: flex; overflow: hidden; min-width: 0; }

  /* Settings panel */
  #settings-panel {
    flex: 1;
    padding: 24px;
    overflow-y: scroll;
    overflow-x: hidden;
    background: #f4f6f9;
    min-width: 0;
    scrollbar-width: thin;
    scrollbar-color: #c0d4e8 transparent;
  }
  #settings-panel::-webkit-scrollbar { width: 6px; }
  #settings-panel::-webkit-scrollbar-track { background: transparent; }
  #settings-panel::-webkit-scrollbar-thumb { background: #c0d4e8; border-radius: 3px; }
  #settings-panel h1 {
    font-size: 20px;
    font-weight: 700;
    color: #0f4c81;
    margin-bottom: 6px;
  }
  #settings-panel .subtitle {
    font-size: 12px;
    color: #888;
    margin-bottom: 20px;
  }
  /* Visual cards grid */
  #visual-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    margin-top: 4px;
  }
  .vis-card {
    background: #fff;
    border-radius: 10px;
    padding: 14px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color .15s, box-shadow .15s;
  }
  .vis-card:hover { border-color: #1f8ac0; box-shadow: 0 3px 10px rgba(31,138,192,.15); }
  .vis-card .vc-name { font-size: 13px; font-weight: 700; color: #0f4c81; margin-bottom: 8px; }
  .vis-card .vc-key  { font-size: 10px; color: #aaa; font-family: monospace; margin-bottom: 8px; }
  .vis-card .vc-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .vc-tag {
    font-size: 10px; padding: 2px 7px;
    border-radius: 10px; background: #eaf2fb; color: #1f8ac0;
    white-space: nowrap;
  }
  .vc-tag.off { background: #f5f5f5; color: #aaa; }

  /* ── MODAL ── */
  #modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.45); z-index: 100;
    align-items: center; justify-content: center;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: #fff; border-radius: 12px;
    width: min(680px, 94vw); max-height: 86vh;
    display: flex; flex-direction: column;
    box-shadow: 0 8px 40px rgba(0,0,0,.25);
    overflow: hidden;
  }
  #modal-header {
    padding: 16px 20px; background: #0f4c81; color: #fff;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  #modal-header h2 { font-size: 16px; margin: 0; }
  #modal-header .modal-key { font-size: 11px; opacity: .7; font-family: monospace; margin-top: 2px; }
  #modal-close {
    background: none; border: none; color: #fff;
    font-size: 22px; cursor: pointer; line-height: 1; padding: 0 4px;
  }
  #modal-body {
    flex: 1; overflow-y: scroll; padding: 16px 20px;
    scrollbar-width: thin; scrollbar-color: #c0d4e8 transparent;
  }
  #modal-body::-webkit-scrollbar { width: 6px; }
  #modal-body::-webkit-scrollbar-thumb { background: #c0d4e8; border-radius: 3px; }

  .placeholder-msg {
    color: #aaa;
    font-size: 14px;
    margin-top: 60px;
    text-align: center;
  }

  /* ── SETTINGS PANEL ── */
  .card {
    background: #fff;
    border-radius: 8px;
    margin-bottom: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,.07);
    overflow: hidden;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: #eaf2fb;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: #0f4c81;
    user-select: none;
  }
  .card-header:hover { background: #d6e8f7; }
  .card-header .arrow { font-size: 10px; transition: transform .2s; }
  .card-header.open .arrow { transform: rotate(90deg); }
  .card-body { padding: 12px 16px; display: none; }
  .card-body.open { display: block; }
  .prop-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid #f0f0f0;
    gap: 12px;
  }
  .prop-row:last-child { border-bottom: none; }
  .prop-label {
    font-size: 12px;
    color: #444;
    flex: 1;
    min-width: 0;
  }
  .prop-control { display: flex; align-items: center; gap: 6px; }
  /* Toggle */
  .toggle { position: relative; width: 36px; height: 20px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: #ccc; border-radius: 20px; cursor: pointer;
    transition: background .2s;
  }
  .toggle-slider:before {
    content: ""; position: absolute;
    width: 14px; height: 14px; left: 3px; top: 3px;
    background: #fff; border-radius: 50%; transition: transform .2s;
  }
  .toggle input:checked + .toggle-slider { background: #1f8ac0; }
  .toggle input:checked + .toggle-slider:before { transform: translateX(16px); }
  /* Number */
  input[type=number].prop-num {
    width: 64px; padding: 4px 6px; border: 1px solid #ddd;
    border-radius: 5px; font-size: 12px; text-align: right;
  }
  /* Text / select */
  input[type=text].prop-text, select.prop-select {
    padding: 4px 6px; border: 1px solid #ddd;
    border-radius: 5px; font-size: 12px; max-width: 140px;
  }
  /* Color */
  .color-wrap { display: flex; align-items: center; gap: 6px; }
  .color-wrap input[type=color] { width: 28px; height: 28px; border: none; padding: 0; cursor: pointer; border-radius: 4px; }
  .color-hex { font-size: 11px; color: #666; font-family: monospace; }
  /* Nested sub-card */
  .sub-card { background: #f8fafd; border: 1px solid #e0eaf5; border-radius: 6px; padding: 8px 12px; margin-top: 4px; }
  .sub-card-title { font-size: 11px; font-weight: 600; color: #1f8ac0; margin-bottom: 6px; }

  /* JSON panel — hidden by default, toggled via button */
  #json-panel {
    width: 0;
    min-width: 0;
    overflow: hidden;
    background: #1e1e2e;
    color: #cdd6f4;
    display: flex;
    flex-direction: column;
    border-left: none;
    transition: width .25s ease, min-width .25s ease;
  }
  #json-panel.open {
    width: 400px;
    min-width: 300px;
    border-left: 1px solid #2a2a3e;
  }
  #json-panel-header {
    padding: 12px 16px;
    background: #181825;
    font-size: 12px;
    color: #89b4fa;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .json-key  { color: #89b4fa; }
  .json-str  { color: #a6e3a1; }
  .json-num  { color: #fab387; }
  .json-bool { color: #f38ba8; }
  .json-null { color: #6c7086; }
  #json-output {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
    font-size: 11.5px;
    font-family: 'Consolas', 'Cascadia Code', monospace;
    white-space: pre;
    color: #cdd6f4;
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <h2>Visuals</h2>
  <input id="sidebar-search" type="text" placeholder="Search visuals…">
  <ul id="visual-list"></ul>
</nav>

<!-- EDIT MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-header">
      <div>
        <h2 id="modal-title">Visual</h2>
        <div class="modal-key" id="modal-key"></div>
      </div>
      <button id="modal-close" onclick="closeEditModal()">&#x2715;</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <section id="settings-panel">
    <!-- Global settings bar -->
    <div id="global-bar" style="background:#fff;border-radius:8px;padding:12px 16px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;flex-wrap:wrap;gap:16px;align-items:center;">
      <span style="font-size:12px;font-weight:700;color:#0f4c81;min-width:80px;">Theme Globals</span>
      <label style="font-size:12px;color:#444;display:flex;align-items:center;gap:6px;">
        Background
        <input type="color" id="g-background" style="width:26px;height:26px;border:none;border-radius:4px;cursor:pointer;">
      </label>
      <label style="font-size:12px;color:#444;display:flex;align-items:center;gap:6px;">
        Foreground
        <input type="color" id="g-foreground" style="width:26px;height:26px;border:none;border-radius:4px;cursor:pointer;">
      </label>
      <label style="font-size:12px;color:#444;display:flex;align-items:center;gap:6px;">
        Table Accent
        <input type="color" id="g-tableAccent" style="width:26px;height:26px;border:none;border-radius:4px;cursor:pointer;">
      </label>
      <span style="font-size:12px;color:#444;">Data Colors:</span>
      <div id="data-colors" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
      <h1 id="panel-title" style="margin:0;">All Visuals</h1>
      <button id="json-toggle-btn" onclick="toggleJSON()" style="font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid #1f8ac0;background:#fff;color:#1f8ac0;cursor:pointer;font-weight:600;">{ } Show JSON</button>
    </div>
    <p class="subtitle" id="panel-subtitle" style="margin-bottom:16px;">Click any visual card to edit its theme settings.</p>
    <div id="visual-grid"></div>
  </section>

  <aside id="json-panel">
    <div id="json-panel-header">
    Live JSON Preview
    <span style="float:right;display:flex;gap:6px;">
      <button onclick="copyJSON()" style="font-size:11px;padding:3px 8px;border-radius:4px;border:none;background:#313244;color:#cdd6f4;cursor:pointer;">Copy</button>
      <button onclick="downloadJSON()" style="font-size:11px;padding:3px 8px;border-radius:4px;border:none;background:#313244;color:#cdd6f4;cursor:pointer;">Download</button>
    </span>
  </div>
    <div id="json-output">{}</div>
  </aside>
</div>

let currentVisual = null;

function syntaxHL(json) {
  return json
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[0-9a-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, m => {
      let cls = 'json-num';
      if (/^"/.test(m)) cls = /:$/.test(m) ? 'json-key' : 'json-str';
      else if (/true|false/.test(m)) cls = 'json-bool';
      else if (/null/.test(m)) cls = 'json-null';
      return `<span class="${cls}">${m}</span>`;
    });
}

function updateJSON() {
  const out = document.getElementById('json-output');
  if (!currentVisual) { out.innerHTML = syntaxHL('{}'); return; }
  const snippet = { [currentVisual]: THEME.visualStyles[currentVisual] };
  out.innerHTML = syntaxHL(JSON.stringify(snippet, null, 2));
}

// ── Build sidebar from label map ──
function buildSidebar(filter = "") {
  const list = document.getElementById("visual-list");
  list.innerHTML = "";
  const term = filter.toLowerCase();

  Object.entries(VISUAL_LABELS).forEach(([key, label]) => {
    if (term && !label.toLowerCase().includes(term) && !key.toLowerCase().includes(term)) return;
    const li = document.createElement("li");
    li.dataset.key = key;
    li.innerHTML = label;
    if (key === "*") {
      const badge = document.createElement("span");
      badge.className = "badge";
      badge.textContent = "global";
      li.appendChild(badge);
    }
    li.addEventListener("click", () => selectVisual(key, label, li));
    list.appendChild(li);
  });
}

function isSolidColor(v) {
  return v && typeof v === 'object' && v.solid && v.solid.color;
}

function getSolidColor(v) { return v.solid.color; }

function setSolidColor(obj, key, hex) {
  obj[key] = { solid: { color: hex } };
}

function setNestedPath(obj, path, value) {
  const keys = path.split('.');
  let cur = obj;
  for (let i = 0; i < keys.length - 1; i++) cur = cur[keys[i]];
  cur[keys[keys.length - 1]] = value;
}

function renderControl(val, onChange) {
  const wrap = document.createElement('div');
  wrap.className = 'prop-control';

  if (typeof val === 'boolean') {
    const label = document.createElement('label');
    label.className = 'toggle';
    const inp = document.createElement('input');
    inp.type = 'checkbox';
    inp.checked = val;
    inp.addEventListener('change', () => onChange(inp.checked));
    const slider = document.createElement('span');
    slider.className = 'toggle-slider';
    label.appendChild(inp);
    label.appendChild(slider);
    wrap.appendChild(label);

  } else if (isSolidColor(val)) {
    const cw = document.createElement('div');
    cw.className = 'color-wrap';
    const inp = document.createElement('input');
    inp.type = 'color';
    inp.value = getSolidColor(val).toLowerCase();
    const hex = document.createElement('span');
    hex.className = 'color-hex';
    hex.textContent = inp.value.toUpperCase();
    inp.addEventListener('input', () => {
      hex.textContent = inp.value.toUpperCase();
      onChange({ solid: { color: inp.value.toUpperCase() } });
    });
    cw.appendChild(inp);
    cw.appendChild(hex);
    wrap.appendChild(cw);

  } else if (typeof val === 'number') {
    const inp = document.createElement('input');
    inp.type = 'number';
    inp.className = 'prop-num';
    inp.value = val;
    inp.addEventListener('change', () => onChange(Number(inp.value)));
    wrap.appendChild(inp);

  } else if (typeof val === 'string') {
    const enumKey = Object.keys(ENUMS).find(k => ENUMS[k].includes(val));
    if (enumKey) {
      const sel = document.createElement('select');
      sel.className = 'prop-select';
      ENUMS[enumKey].forEach(opt => {
        const o = document.createElement('option');
        o.value = opt; o.textContent = opt;
        if (opt === val) o.selected = true;
        sel.appendChild(o);
      });
      sel.addEventListener('change', () => onChange(sel.value));
      wrap.appendChild(sel);
    } else {
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'prop-text';
      inp.value = val;
      inp.addEventListener('change', () => onChange(inp.value));
      wrap.appendChild(inp);
    }
  }
  return wrap;
}

function renderProps(props, onChange) {
  const frag = document.createDocumentFragment();
  Object.entries(props).forEach(([key, val]) => {
    // nested array (e.g. gridlines)
    if (Array.isArray(val) && val.length > 0 && typeof val[0] === 'object') {
      const sub = document.createElement('div');
      const title = document.createElement('div');
      title.className = 'sub-card-title';
      title.textContent = key;
      sub.className = 'sub-card';
      sub.appendChild(title);
      sub.appendChild(renderProps(val[0], (subKey, newVal) => {
        val[0][subKey] = newVal;
        onChange(key, val);
        updateJSON();
      }));
      const row = document.createElement('div');
      row.className = 'prop-row';
      const lbl = document.createElement('span');
      lbl.className = 'prop-label';
      lbl.textContent = key;
      row.appendChild(sub);
      frag.appendChild(row);
      return;
    }

    if (isSolidColor(val) || typeof val === 'boolean' || typeof val === 'number' || typeof val === 'string') {
      const row = document.createElement('div');
      row.className = 'prop-row';
      const lbl = document.createElement('span');
      lbl.className = 'prop-label';
      lbl.textContent = key;
      const ctrl = renderControl(val, newVal => {
        onChange(key, newVal);
        updateJSON();
      });
      row.appendChild(lbl);
      row.appendChild(ctrl);
      frag.appendChild(row);
    }
  });
  return frag;
}

function renderCards(visualKey) {
  const panel = document.getElementById('settings-panel');
  const title = document.getElementById('panel-title');
  const sub = document.getElementById('panel-subtitle');
  const placeholder = document.getElementById('panel-placeholder');

  placeholder.style.display = 'none';

  // Remove old cards
  panel.querySelectorAll('.card').forEach(c => c.remove());

  const style = THEME.visualStyles[visualKey];
  if (!style) return;
  const cards = style['*'];
  if (!cards) return;

  Object.entries(cards).forEach(([cardName, cardArr]) => {
    if (!Array.isArray(cardArr) || cardArr.length === 0) return;
    const props = cardArr[0];

    const card = document.createElement('div');
    card.className = 'card';

    const header = document.createElement('div');
    header.className = 'card-header';
    header.innerHTML = `${cardName} <span class="arrow">▶</span>`;
    header.addEventListener('click', () => {
      header.classList.toggle('open');
      body.classList.toggle('open');
    });

    const body = document.createElement('div');
    body.className = 'card-body';
    body.appendChild(renderProps(props, (propKey, newVal) => {
      props[propKey] = newVal;
      updateJSON();
    }));

    card.appendChild(header);
    card.appendChild(body);
    panel.appendChild(card);
  });
}

function selectVisual(key, label, el) {
  document.querySelectorAll("#visual-list li").forEach(l => l.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("panel-title").textContent = label;
  document.getElementById("panel-subtitle").textContent = `JSON key: "${key}"`;
  currentVisual = key;
  renderCards(key);
  updateJSON();
}

function toggleJSON() {
  const panel = document.getElementById('json-panel');
  const btn = document.getElementById('json-toggle-btn');
  panel.classList.toggle('open');
  btn.textContent = panel.classList.contains('open') ? '{ } Hide JSON' : '{ } Show JSON';
}

  const blob = new Blob([JSON.stringify(THEME, null, 2)], {type:'application/json'});

  a.download = 'Customer360_Theme.json';

}

  });
}

function openEditModal(key, label) {
  currentVisual = key;
  document.getElementById('modal-title').textContent = label;
  document.getElementById('modal-key').textContent = `visualStyles["${key}"]["*"]`;
  updateJSON();

  const body = document.getElementById('modal-body');
  body.innerHTML = '';

  const style = THEME.visualStyles[key];
  if (!style || !style['*']) {
    body.innerHTML = '<p style="color:#aaa;padding:20px;">No settings defined for this visual.</p>';
  } else {
    Object.entries(style['*']).forEach(([cardName, cardArr]) => {
      if (!Array.isArray(cardArr) || !cardArr[0]) return;
      body.appendChild(buildModalCard(cardName, cardArr[0], key));
    });
  }

  document.getElementById('modal-overlay').classList.add('open');
}

function closeEditModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  buildGrid(); // refresh tags on cards
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeEditModal();
});

function buildModalCard(cardName, props, visualKey) {
  const wrap = document.createElement('div');
  wrap.className = 'card';
  wrap.style.marginBottom = '14px';

  const header = document.createElement('div');
  header.className = 'card-header open';
  header.innerHTML = `${cardName} <span class="arrow" style="transform:rotate(90deg)">▶</span>`;
  header.addEventListener('click', () => {
    header.classList.toggle('open');
    body.classList.toggle('open');
    header.querySelector('.arrow').style.transform = header.classList.contains('open') ? 'rotate(90deg)' : '';
  });

  const body = document.createElement('div');
  body.className = 'card-body open';
  body.appendChild(buildPropRows(props, visualKey, cardName));

  wrap.appendChild(header);
  wrap.appendChild(body);
  return wrap;
}

function buildPropRows(props, visualKey, cardName) {
  const frag = document.createDocumentFragment();
  Object.entries(props).forEach(([key, val]) => {
    // nested array (e.g. gridlines: [{show, color}])
    if (Array.isArray(val) && val.length > 0 && typeof val[0] === 'object') {
      const sub = document.createElement('div');
      sub.className = 'sub-card';
      const t = document.createElement('div');
      t.className = 'sub-card-title';
      t.textContent = key;
      sub.appendChild(t);
      sub.appendChild(buildPropRows(val[0], visualKey, cardName + '.' + key));
      const row = document.createElement('div');
      row.className = 'prop-row';
      row.appendChild(sub);
      frag.appendChild(row);
      return;
    }
    // solid color object
    if (isSolidColor(val)) {
      frag.appendChild(makeRow(key, makeColorControl(val, newVal => {
        props[key] = newVal; updateJSON();
      })));
      return;
    }
    // plain object (e.g. background: {solid:{color}}) already handled above
    if (typeof val === 'object') return;

    if (typeof val === 'boolean') {
      frag.appendChild(makeRow(key, makeToggle(val, v => { props[key] = v; updateJSON(); })));
    } else if (typeof val === 'number') {
      frag.appendChild(makeRow(key, makeNumber(key, val, v => { props[key] = v; updateJSON(); })));
    } else if (typeof val === 'string') {
      const enumKey = Object.keys(ENUMS).find(k => k === key || ENUMS[k].includes(val));
      if (enumKey) {
        frag.appendChild(makeRow(key, makeDropdown(enumKey, val, v => { props[key] = v; updateJSON(); })));
      } else {
        frag.appendChild(makeRow(key, makeText(key, val, v => { props[key] = v; updateJSON(); })));
      }
    }
  });
  return frag;
}

function makeRow(label, control) {
  const row = document.createElement('div');
  row.className = 'prop-row';
  const lbl = document.createElement('span');
  lbl.className = 'prop-label';
  lbl.textContent = label;
  row.appendChild(lbl);
  row.appendChild(control);
  return row;
}

function makeToggle(val, onChange) {
  const wrap = document.createElement('div');
  wrap.className = 'prop-control';
  const label = document.createElement('label');
  label.className = 'toggle';
  const inp = document.createElement('input');
  inp.type = 'checkbox'; inp.checked = val;
  inp.addEventListener('change', () => onChange(inp.checked));
  const slider = document.createElement('span');
  slider.className = 'toggle-slider';
  label.appendChild(inp); label.appendChild(slider);
  wrap.appendChild(label);
  return wrap;
}

function makeColorControl(val, onChange) {
  const wrap = document.createElement('div');
  wrap.className = 'prop-control';
  const cw = document.createElement('div');
  cw.className = 'color-wrap';
  const inp = document.createElement('input');
  inp.type = 'color';
  inp.value = getSolidColor(val).toLowerCase();
  const hex = document.createElement('span');
  hex.className = 'color-hex';
  hex.textContent = inp.value.toUpperCase();
  inp.addEventListener('input', () => {
    hex.textContent = inp.value.toUpperCase();
    onChange({ solid: { color: inp.value.toUpperCase() } });
  });
  cw.appendChild(inp); cw.appendChild(hex);
  wrap.appendChild(cw);
  return wrap;
}

function makeNumber(key, val, onChange) {
  const wrap = document.createElement('div');
  wrap.className = 'prop-control';
  const rule = VALIDATION[key] || {};
  const inp = document.createElement('input');
  inp.type = 'number'; inp.className = 'prop-num';
  inp.value = val;
  if (rule.min !== undefined) inp.min = rule.min;
  if (rule.max !== undefined) inp.max = rule.max;
  if (rule.step)              inp.step = rule.step;
  inp.addEventListener('change', () => {
    let v = Number(inp.value);
    if (rule.min !== undefined && v < rule.min) { v = rule.min; inp.value = v; }
    if (rule.max !== undefined && v > rule.max) { v = rule.max; inp.value = v; }
    onChange(v);
  });
  wrap.appendChild(inp);
  return wrap;
}

function makeDropdown(enumKey, val, onChange) {
  const wrap = document.createElement('div');
  wrap.className = 'prop-control';
  const sel = document.createElement('select');
  sel.className = 'prop-select';
  ENUMS[enumKey].forEach(opt => {
    const o = document.createElement('option');
    o.value = opt; o.textContent = opt;
    if (opt === val) o.selected = true;
    sel.appendChild(o);
  });
  sel.addEventListener('change', () => onChange(sel.value));
  wrap.appendChild(sel);
  return wrap;
}

function makeText(key, val, onChange) {
  const wrap = document.createElement('div');
  wrap.className = 'prop-control';
  const inp = document.createElement('input');
  inp.type = 'text'; inp.className = 'prop-text';
  inp.value = val; inp.maxLength = 100;
  // validate: hex color strings must match pattern
  if (key.toLowerCase().includes('color') || val.startsWith('#')) {
    inp.pattern = '^#[0-9A-Fa-f]{6}$';
    inp.title = 'Hex color e.g. #1F8AC0';
    inp.style.fontFamily = 'monospace';
  }
  inp.addEventListener('change', () => {
    if (inp.validity.valid) onChange(inp.value);
    else inp.style.borderColor = '#e76f51';
  });
  inp.addEventListener('input', () => inp.style.borderColor = '');
  wrap.appendChild(inp);
  return wrap;
}

// ── Visual cards grid ──
function buildGrid(filter) {
  const grid = document.getElementById('visual-grid');
  grid.innerHTML = '';
  const term = (filter || '').toLowerCase();

  Object.entries(VISUAL_LABELS).forEach(([key, label]) => {
    if (term && !label.toLowerCase().includes(term) && !key.toLowerCase().includes(term)) return;
    const style = THEME.visualStyles[key];
    const cards = style && style['*'] ? Object.keys(style['*']) : [];

    const card = document.createElement('div');
    card.className = 'vis-card';
    card.innerHTML = `
      <div class="vc-name">${label}</div>
      <div class="vc-key">${key}</div>
      <div class="vc-tags">${cards.map(c => {
        const props = style['*'][c][0] || {};
        const isOff = props.show === false;
        return `<span class="vc-tag${isOff ? ' off' : ''}">${c}</span>`;
      }).join('')}</div>`;
    card.addEventListener('click', () => openEditModal(key, label));
    grid.appendChild(card);
  });
}

// Sync sidebar search to grid
document.getElementById("sidebar-search").addEventListener("input", e => {
  buildSidebar(e.target.value);
  buildGrid(e.target.value);
});

// Sidebar click now opens modal directly
function selectVisual(key, label, el) {
  document.querySelectorAll("#visual-list li").forEach(l => l.classList.remove("active"));
  el.classList.add("active");
  currentVisual = key;
  updateJSON();
  openEditModal(key, label);
}

// ── Init ──
buildSidebar();
buildGrid();
initGlobalBar();
</script>
</body>
</html>
